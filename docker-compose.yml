services:
  db:
    image: postgres:16-alpine
    container_name: jlbcrm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: jlbcrm
    ports:
      - "5432:5432"
    volumes:
      - jlbcrm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d jlbcrm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jlbcrm-pgdata:
